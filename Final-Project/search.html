<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Search Products | BoostCart</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@3.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<nav class="navbar navbar-inverse navbar-fixed-top">
  <div class="container">

    <div class="navbar-header">
      <button type="button" class="navbar-toggle collapsed" data-toggle="collapse" data-target="#mainNav">
        <span class="icon-bar"></span>
        <span class="icon-bar"></span>
        <span class="icon-bar"></span>
      </button>

      <a class="navbar-brand" href="index.html">BoostCart</a>
    </div>

    <div class="collapse navbar-collapse" id="mainNav">
      <ul class="nav navbar-nav navbar-right">
        <li><a href="index.html">Featured</a></li>
        <li><a href="search.html">Search Products</a></li>
      </ul>
    </div>

  </div>
</nav>

<div class="container main-container">

  <div class="jumbotron text-center hero">
    <h1>Product Search</h1>
    <p>Search Amazon products using the Real-Time Amazon Data API.</p>
  </div>

  <div class="panel panel-default search-panel">
    <div class="panel-body">

      <div class="row">
        <div class="col-md-8">
          <input type="text" id="searchInput" class="form-control input-lg" placeholder="Search products, brands, electronics...">
        </div>

        <div class="col-md-4">
          <button onclick="searchProducts()" class="btn btn-primary btn-lg btn-block">
            Search Products
          </button>
        </div>
      </div>

      <div class="row filter-row">
        <div class="col-md-4">
          <label>Filter by Rating</label>
          <select id="ratingFilter" class="form-control" onchange="displayProducts(allProducts)">
            <option value="0">All Ratings</option>
            <option value="4">4 Stars and Up</option>
            <option value="3">3 Stars and Up</option>
          </select>
        </div>

        <div class="col-md-4">
          <label>Sort Products</label>
          <select id="sortFilter" class="form-control" onchange="displayProducts(allProducts)">
            <option value="default">Default</option>
            <option value="ratingHigh">Highest Rating</option>
            <option value="reviewsHigh">Most Reviews</option>
          </select>
        </div>
      </div>

    </div>
  </div>

  <div id="message"></div>
  <div id="results" class="row"></div>

</div>

<footer class="text-center">
  <p>BoostCart Final Project | Search Page</p>
</footer>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@3.3.7/dist/js/bootstrap.min.js"></script>
<script src="js/search.js"></script>

</body>
</html>
