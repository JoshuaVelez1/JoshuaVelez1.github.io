<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Lab 5 Registration</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/js/bootstrap.min.js"></script>
</head>
<body>
    <div class="jumbotron text-center">
        <h1>BoostDrive Performance</h1>
        <p>Create your performance account</p>
    </div>
    <div class="container">
    <div class="row">
    <div class="col-sm-8 col-sm-offset-2">

    <form onsubmit="handleRegister(); return false;">

    <label>First Name</label>
    <input type="text" id="firstName" class="form-control">
    
    <label>Last Name</label>
    <input type="text" id="lastName" class="form-control">

    <label>Email</label>
    <input type="email" id="email" class="form-control">

    <label>Password</label>
    <input type="password" id="password" class="form-control">

    <label>Date of Birth</label>
    <input type="date" id="dob" class="form-control">

    <button type="submit" class="btn btn-primary btn-block">Register</button>

    </form>

    <div id="output" style="margin-top:15px;"></div>
    </div>
    </div>
    </div>

    <script>
    function handleRegister(){
        var firstName = document.getElementById("firstName").value;
        var lastName = document.getElementById("lastName").value;
        var email = document.getElementById("email").value;
        var password = document.getElementById("password").value;
        var dob = document.getElementById("dob").value;

        var output = document.getElementById("output");

        if (firstName === "" || lastName === "" || email === "" || password === "" || dob === "") {
        output.className = "alert alert-danger";
        output.innerHTML = "Registration Failed - all fields required";
        return;
}

        if (password.indexOf("!") === -1 && password.indexOf("?") === -1) {
        output.className = "alert alert-danger";
        output.innerHTML = "Registration Failed - password must contain ! or ?";
        return;
}
        var user = {
            firstName: firstName,
            lastName: lastName,
            email: email,
            password: "*".repeat(password.length),
            dob: dob
        };

        output.className = "alert alert-success";
        output.innerHTML =
        "<strong>Registration Successful</strong><br>" +
        "First Name: " + user.firstName + "<br>" +
        "Last Name: " + user.lastName + "<br>" +
        "Email: " + user.email + "<br>" +
        "Password: " + user.password + "<br>" +
        "DOB: " + user.dob;


    }
    </script>
</body>
</html>
