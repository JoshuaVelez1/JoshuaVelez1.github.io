<!DOCTYPE html>
<html>
<head>
    <title>Lab 5 Registration</title>
</head>
<body>
    <h1>BoostDrive Performance</h1>

    <form onsubmit="handleRegister(); return false;">

    <label>First Name</label>
    <input type="text" id="firstName"><br><br>
    
    <label>Last Name</label>
    <input type="text" id="lastName"><br><br>

    <label>Email</label>
    <input type="email" id="email"><br><br>

    <label>Password</label>
    <input type="password" id="password"><br><br>

    <label>Date of Birth</label>
    <input type="date" id="dob"><br><br>

    <button type="submit">Register</button>

    </form>

    <div id="output"></div>

    <script>
    function handleRegister(){
        var firstName = document.getElementById("firstName").value;
        var lastName = document.getElementById("lastName").value;
        var email = document.getElementById("email").value;
        var password = document.getElementById("password").value;
        var dob = document.getElementById("dob").value;

        var output = document.getElementById("output");

        if (firstName === "" || lastName === "" || email === "" || password === "" || dob === "") {
        output.innerHTML = "Registration Failed — all fields required";
        return;
        }   

        if (password.indexOf("!") === -1 && password.indexOf("?") === -1) {
        output.innerHTML = "Registration Failed — password must contain ! or ?";
        return;
}
    }
    </script>
</body>
</html>
