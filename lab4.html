<!DOCTYPE html>
<html>
<head>
    <title>CSC 225 Lab 4</title>
</head>
<body>
    <h1 id="greeting"></h1>
    <p id="name"></p>
    <p id="item"></p>
    <p id="quantity"></p>
    <p id="arrival"></p>

    <script>
        alert("Welcome to the store");

        var customerName = prompt("Enter your name");
        var itemRequested = prompt("Enter the item requested");
        var numberOfItems = prompt("Enter the number of items");

        var today = new Date();
        var hour = today.getHours();
        var greeting = "";

        if (hour < 12) {
            greeting = "Good Morning " + customerName + ", Thank you for Ordering!";
        } else if (hour < 18) {
            greeting = "Good Afternoon " + customerName + ", Thank you for Ordering!";
        } else {
            greeting = "Good Evening " + customerName + ", Thank you for Ordering!";
        }

        var arrivalDate = new Date();
        arrivalDate.setDate(arrivalDate.getDate() + 7);

        document.getElementById("greeting").innerHTML = greeting;
        document.getElementById("name").innerHTML = "Name: " + customerName;
        document.getElementById("item").innerHTML = "Item Requested: " + itemRequested;
        document.getElementById("quantity").innerHTML = "Number of Items: " + numberOfItems;
        document.getElementById("arrival").innerHTML = "Expected Arrival Date: " + arrivalDate.toDateString();
    </script>

</body>
</html>
